<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <link rel="stylesheet" href="styleprofile.css">
</head>
<body>

    <div class="container">
    
        <header class="header">
            <button class="back-button">Back</button>
            <h1>Profile</h1>
        </header>

        <div class="card profile-card">
            <div class="profile-header">
                <div class="avatar">
                    <img src="Profile.png" alt="Profile Avatar">
                </div>
                <button class="change-profile-button">Change profile</button>
            </div>
            <div class="profile-info">
                <p class="username">(Username)</p>
                <p class="role">Student/Admin</p>
            </div>
        </div>

        <div class="card metrics-card">
            <h2>Overall Learning Metrics</h2>
            
            <div class="metric-row">
                <span class="course-label">Course 1</span>
                <div class="progress-bar">
                    <div class="progress">75%</div>
                </div>
            </div>

            <div class="metric-row">
                <span class="course-label">Course 2</span>
                <div class="progress-bar">
                    <div class="progress">80%</div>
                </div>
            </div>

            <div class="metric-row">
                <span class="course-label">Course 3</span>
                <div class="progress-bar">
                    <div class="progress">60%</div>
                </div>
            </div>

            <div class="metric-row">
                <span class="course-label">Course 4</span>
                <div class="progress-bar">
                    <div class="progress">90%</div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
