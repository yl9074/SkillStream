<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses</title>
    <link rel="stylesheet" href="stylecourses.css">
</head>
<body>
    <header class="header">
        <a href="dashboard.html"><button class="back-button">Back</button></a>
    </header>
    <div class="dashboard-wrapper">
        <h1 class="section-title">Choose Your Desired Course</h1>
        <div class="course-grid">

            <a href="courses.html" class="course-card">
                <div class="card-banner">
                    <img src="courses images/Business Management.png" alt="Business Management image">
                </div>
                <div class="card-body">
                    <div class="provider-info">
                        <span class="course-genre">Business</span>
                    </div>
                    <h3 class="course-name">Business Management</h3>
                </div>
            </a>

            <a href="courses.html" class="course-card">
                <div class="card-banner">
                    <img src="courses images/HTML & CSS.png" alt="HTML & CSS for beginners image">
                </div>
                <div class="card-body">
                    <div class="provider-info">
                        <span class="course-genre">Computer Science</span>
                    </div>
                    <h3 class="course-name">HTML & CSS for beginners</h3>
                </div>
            </a>

            <a href="courses.html" class="course-card">
                <div class="card-banner">
                    <img src="courses images/Financial Analysis.png" alt="Finance Analysis image">
                </div>
                <div class="card-body">
                    <div class="provider-info">
                        <span class="course-genre">Finance</span>
                    </div>
                    <h3 class="course-name">Financial Analysis</h3>
                </div>
            </a>

            <a href="courses.html" class="course-card">
                <div class="card-banner">
                    <img src="courses images/Accounting Fundamentals.png" alt="Accounting Fundamentals image">
                </div>
                <div class="card-body">
                    <div class="provider-info">
                        <span class="course-genre">Accounting</span>
                    </div>
                    <h3 class="course-name">Accounting Fundamentals</h3>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
