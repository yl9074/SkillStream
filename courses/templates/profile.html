{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <link rel="stylesheet" href="{% static 'styleprofile.css' %}">
</head>
<body>

    <div class="container">
    
        <header class="header">
            <a href="{% url 'dashboard' %}"><button class="back-button">Back</button></a>
            <h1>Profile</h1>
        </header>

        <div class="card profile-card">
            <div class="profile-header">
                <div class="avatar">
                    <img src="{% static 'images/Profile.png' %}" id="profile-image" alt="Profile Avatar">
                </div>
                <button class="change-profile-button" id="upload-button">Change profile</button>
                <input type="file" id="file-input" accept="image/*" style="display: none;">
            </div>
            <div class="profile-info">
                <h2>{{ request.user.username }}</h2>
                <p class="role">Student/Admin</p>
                <p>User since: {{ request.user.date_joined|date:"F j, Y" }}</p>
            </div>
        </div>

        <div class="card metrics-card">
            <h2>Overall Learning Metrics</h2>
            
            <div class="metric-row">
                <span class="course-label">Course 1</span>
                <div class="progress-bar">
                    <div class="progress">75%</div>
                </div>
            </div>

            <div class="metric-row">
                <span class="course-label">Course 2</span>
                <div class="progress-bar">
                    <div class="progress">80%</div>
                </div>
            </div>

            <div class="metric-row">
                <span class="course-label">Course 3</span>
                <div class="progress-bar">
                    <div class="progress">60%</div>
                </div>
            </div>

            <div class="metric-row">
                <span class="course-label">Course 4</span>
                <div class="progress-bar">
                    <div class="progress">90%</div>
                </div>
            </div>
        </div>
    </div>

    <script>

    const uploadBtn = document.getElementById('upload-button');
    const fileInput = document.getElementById('file-input');
    const profileImg = document.getElementById('profile-image');

    uploadBtn.addEventListener('click', function() {
        fileInput.click();
    });

    fileInput.addEventListener('change', function() {
        const file = this.files[0];

        if (file) {
            const objectURL = URL.createObjectURL(file);
            
            profileImg.src = objectURL;
        }
    });
    </script>

</body>
</html>
