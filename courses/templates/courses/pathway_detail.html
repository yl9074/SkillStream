<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ pathway.title }}</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px;">

    <h1>Pathway: {{ pathway.title }}</h1>
    <hr>

    <div style="display: flex; flex-direction: column; gap: 40px; margin-top: 20px;">
        {% for video in videos %}
            <div>
                <h3>Lesson {{ video.sequence_order }}</h3>
                
                <iframe 
                    width="640" 
                    height="360" 
                    src="{{ video.get_embed_url }}" 
                    title="YouTube video player" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    referrerpolicy="strict-origin-when-cross-origin" 
                    allowfullscreen>
                </iframe>
            </div>
        {% empty %}
            <p>No videos available for this pathway yet. Check back later!</p>
        {% endfor %}
    </div>

</body>
</html>
