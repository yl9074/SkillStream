<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ pathway.title }}</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 0; padding: 40px; background-color: #f8f9fa; color: #1f1f1f;">

    <header>
        <a href="{% url 'courses' %}" 
            style="background-color: #e2e8f0; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; transition: background-color 0.2s ease; text-decoration: none; color: #1f1f1f; display: inline-block; margin-bottom: 20px;"
       
            onmouseover="this.style.backgroundColor='#cbd5e1';" 
       
            onmouseout="this.style.backgroundColor='#e2e8f0';">
            Back to All Courses
        </a>
    </header>

    <h1>Pathway: {{ pathway.title }}</h1>
    <hr>

    <div style="display: flex; flex-direction: column; gap: 40px; margin-top: 20px;">
        {% for video in videos %}
            <div>
                <h3>Lesson {{ video.sequence_order }}</h3>
                
                <iframe 
                    width="100%" 
                    height="500" 
                    src="{{ video.get_embed_url }}" 
                    title="YouTube video player" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    referrerpolicy="strict-origin-when-cross-origin" 
                    allowfullscreen>
                </iframe>

                <div style="text-align: left; margin-top: 20px;">
                    <form action="{% url 'mark_video_complete' video.id %}" method="POST">
                        {% csrf_token %}
                        <button type="submit" style="background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;">
                             Mark as Complete
                        </button>
                    </form>
                </div>

            </div>
        {% empty %}
            <p>No videos available for this pathway yet. Check back later!</p>
        {% endfor %}
    </div>

</body>
</html>
