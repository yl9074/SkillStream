<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - SkillStream</title>
    <style>
        input[type="email"], input[type="text"] { width: 100%; padding: 10px; margin: 10px 0 20px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        label { font-weight: bold; color: #333; }
    </style>
</head>
<body style="font-family: Arial, sans-serif; background-color: #faf7f2; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    
    <div style="background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; width: 100%; text-align: center;">
        <h2 style="color: #1f36bc; margin-top: 0;">Forgot Password?</h2>
        <p style="color: gray; margin-bottom: 30px;">Enter your email address below and we'll send you a secure link to reset your password.</p>
        
        <form method="POST" style="text-align: left;">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="background-color: #3f5649; color: white; padding: 12px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold;">Send Reset Link</button>
        </form>
        <br>
        <a href="{% url 'login' %}" style="color: #1f36bc; text-decoration: none; font-size: 14px;">&larr; Back to Login</a>
    </div>

</body>
</html>
