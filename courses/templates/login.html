{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="sign-up-box">
        <h2>Log In</h2>

        <form method="post">
            {% csrf_token %}
            <div class="input-group">
                <img src="{% static 'images/User.png' %}" alt="User Icon" class="user-icon">
                {{ form.username }}
            </div>
            <div class="input-group">
                <img src="{% static 'images/Lock.png' %}" alt="Lock Icon" class="lock-icon">
                {{ form.password }}
            </div>
            <div style="text-align: right; margin-bottom: 15px;">
                <a href="{% url 'reset_password' %}" style="font-size: 14px; text-decoration: none;">Forgot Password?</a>
            </div>
            <div id="loginButton">
                <button type="submit">LOG IN</button>
            </div>
            <p>Don't Have an Account?</p>
            <p><a href="{% url 'register' %}">Click Here</a> to Sign Up Now!</p>
        </form>
    </div>
</body>
</html>
